<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRK THE SILENCE — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #111111;
  --text: #f2f2f2;
  --divider: #2a2a2a;
  --button-border: #444444;
  --button-hover: #1a1a1a;
}

body.light {
  --bg: #ffffff;
  --text: #1a1a1a;
  --divider: #e5e5e5;
  --button-border: #cccccc;
  --button-hover: #f5f5f5;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display:flex;
  flex-direction:column;
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 24px;
  border-bottom:1px solid var(--divider);
}

.main {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

.container {
  max-width:1000px;
  width:100%;
  display:flex;
  justify-content:space-between;
  gap:60px;
}

.left h1 {
  font-family:'Playfair Display', serif;
  font-size:38px;
  margin-bottom:18px;
}

.right {
  display:flex;
  flex-direction:column;
  gap:18px;
  min-width:220px;
}

button {
  padding:14px;
  background:transparent;
  border:1px solid var(--button-border);
  color:var(--text);
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.counter { font-size:12px; opacity:0.6; }

footer {
  border-top:1px solid var(--divider);
  padding:15px;
  text-align:center;
  font-size:12px;
  opacity:0.6;
}

.signature {
  font-family:"Vijaya","Brush Script MT",cursive;
  margin-left:6px;
}

@media(max-width:900px){
  .container { flex-direction:column; gap:30px; }
  .left h1 { font-size:26px; }
}
</style>
</head>

<body>

<nav>
  <div>BRK THE SILENCE</div>
  <div onclick="toggleTheme()" style="cursor:pointer;">Light / Dark</div>
</nav>

<div class="main">
  <div class="container">

    <div class="left">
      <h1>Silence is about to be examined.</h1>
      <p>A private publication exploring emotional performance and modern realities.</p>
      <p style="font-size:13px;opacity:0.6;">Launching soon.</p>
    </div>

    <div class="right">
      <button id="interestBtn">I’m Interested</button>
      <div class="counter" id="interestCount">Loading...</div>

      <button id="curiousBtn">Just Curious</button>
      <div class="counter" id="curiousCount">Loading...</div>

      <div id="confirmation" style="font-size:13px;opacity:0;margin-top:10px;"></div>
    </div>

  </div>
</div>

<footer>
  © 2026 BRK THE SILENCE
  <span class="signature">(by Siddhant Kuril)</span>
</footer>

<script>
const supabaseUrl = "https://meitgfbhwzmbgcasofbc.supabase.co";
const supabaseKey = "sb_publishable_a6IblQ1mDySl81NqUGy6Zg_Hn7HUO83";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const interestBtn = document.getElementById("interestBtn");
const curiousBtn = document.getElementById("curiousBtn");
const interestCount = document.getElementById("interestCount");
const curiousCount = document.getElementById("curiousCount");
const confirmation = document.getElementById("confirmation");

async function loadCounts() {
  const { data, error } = await supabase
    .from("votes")
    .select("type");

  if (error) {
    console.error(error);
    return;
  }

  const interest = data.filter(v => v.type === "interest").length;
  const curious = data.filter(v => v.type === "curious").length;

  interestCount.textContent = interest + " responses";
  curiousCount.textContent = curious + " responses";
}

async function vote(type) {
  if (localStorage.getItem("hasVoted")) {
    confirmation.style.opacity = 1;
    confirmation.textContent = "You have already voted.";
    interestBtn.disabled = true;
    curiousBtn.disabled = true;
    return;
  }

  await supabase.from("votes").insert([{ type }]);

  localStorage.setItem("hasVoted", "true");

  interestBtn.disabled = true;
  curiousBtn.disabled = true;

  confirmation.style.opacity = 1;
  confirmation.textContent = "Your response has been recorded.";

  loadCounts();
}

interestBtn.addEventListener("click", () => vote("interest"));
curiousBtn.addEventListener("click", () => vote("curious"));

loadCounts();

function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
