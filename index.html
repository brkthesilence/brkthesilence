<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board (Live)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* PASTE YOUR FIREBASE CONFIG HERE */

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TEAMS */

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=["KD","PG","SD","DEV","NR","SPL"]

/* PLAYER LIST (shortened example — replace if needed) */

const players={
Mumbai:["Rohit Sharma","Surya Kumar Yadav","Tilak Verma","Hardik Pandya","Jasprit Bumrah"],
Punjab:["Shreyas Iyer","Marcus Stoinis","Harpreet Brar","Yuzvendra Chahal","Lockie Ferguson"],
Rajasthan:["Yashasvi Jaiswal","Dhruv Jurel","Ravindra Jadeja","Jofra Archer","Kuldeep Sen"],
Bangalore:["Virat Kohli","Phil Salt","Jitesh Sharma","Krunal Pandya","Josh Hazlewood"],
Hyderabad:["Ishan Kishan","Travis Head","Harshal Patel","Pat Cummins","Abhishek Sharma"],
Chennai:["Ruturaj Gaikwad","MS Dhoni","Shivam Dubey","Noor Ahmed","Matt Henry"],
Delhi:["KL Rahul","David Miller","Axar Patel","Mitchell Starc","Kuldeep Yadav"],
Gujarat:["Shubman Gill","Jos Buttler","Sai Sudarshan","Kagiso Rabada","Rashid Khan"],
Kolkata:["Ajinkya Rahane","Rinku Singh","Sunil Narine","Varun Chakravarthy","Harshit Rana"],
Lucknow:["Rishabh Pant","Nicholas Pooran","Mitchell Marsh","Mohd Shami","Avesh Khan"]
}

/* DATA */

let data={}
let points={}

teams.forEach(t=>{
data[t]=Array(players[t].length).fill(null)
points[t]=Array(players[t].length).fill(0)
})

/* SAVE LIVE */

function save(){
set(ref(db,"auction"),{data,points})
}

/* LIVE LISTENER */

onValue(ref(db,"auction"),snapshot=>{
let val=snapshot.val()
if(!val) return
data=val.data
points=val.points
render()
updateLeaderboard()
})

/* RENDER TABLE */

let currentTeam=0

window.render=function(){

const body=document.getElementById("rows")
body.innerHTML=""

players[teams[currentTeam]].forEach((player,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td><td>${player}</td>`

let status=document.createElement("td")
status.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(status)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[teams[currentTeam]][i]==bi){
td.className="buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{
data[teams[currentTeam]][i]=data[teams[currentTeam]][i]==bi?null:bi
save()
}

tr.appendChild(td)

})

let td=document.createElement("td")

let inp=document.createElement("input")
inp.className="pointsInput"
inp.value=points[teams[currentTeam]][i]

inp.oninput=()=>{
points[teams[currentTeam]][i]=parseInt(inp.value)||0
save()
}

td.appendChild(inp)
tr.appendChild(td)

body.appendChild(tr)

})

}

/* LEADERBOARD */

window.updateLeaderboard=function(){

let totals=[0,0,0,0,0,0]

teams.forEach(team=>{
for(let i=0;i<players[team].length;i++){
let buyer=data[team][i]
if(buyer!=null){
totals[buyer]+=points[team][i]
}
}
})

let arr=buyers.map((b,i)=>({name:b,pts:totals[i]}))
arr.sort((a,b)=>b.pts-a.pts)

let colors=[
"#d1fae5",
"#dcfce7",
"#fef9c3",
"#fde68a",
"#fecaca",
"#fbcfe8"
]

let html=""
let total=0

arr.forEach((t,i)=>{
total+=t.pts
html+=`<div class="rank" style="background:${colors[i]};color:#111">
<span>${i+1}. ${t.name}</span>
<span>${t.pts}</span>
</div>`
})

html+=`<div class="summary"><b>Total</b><b>${total}</b></div>`

document.getElementById("leaderboard").innerHTML=html

}

/* EXCEL */

window.exportExcel=function(){

let rows=[]

teams.forEach(team=>{
players[team].forEach((p,i)=>{
rows.push({
Team:team,
Player:p,
Buyer:data[team][i]==null?"Unsold":buyers[data[team][i]],
Points:points[team][i]
})
})
})

let ws=XLSX.utils.json_to_sheet(rows)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Results")

XLSX.writeFile(wb,"AuctionResults.xlsx")

}

</script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #1f2a44;
padding:8px;
text-align:center;
}

.pointsInput{
width:60px;
background:#0f172a;
border:none;
color:white;
text-align:center;
}

.buyer0{background:#3b82f6}
.buyer1{background:#22c55e}
.buyer2{background:#a855f7}
.buyer3{background:#fb923c}
.buyer4{background:#f43f5e}
.buyer5{background:#14b8a6}

.rank{
display:flex;
justify-content:space-between;
padding:8px;
margin-bottom:5px;
border-radius:5px;
}

.summary{
background:#10192c;
padding:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body onload="render()">

<h2 style="padding:15px">T20 Auction Board (Live)</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Status</th>
<th>KD</th>
<th>PG</th>
<th>SD</th>
<th>DEV</th>
<th>NR</th>
<th>SPL</th>
<th>Points</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

<div style="padding:20px">

<button onclick="exportExcel()">Export Excel</button>

<h3>Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</body>
</html>
```
