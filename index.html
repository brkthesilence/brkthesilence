<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
padding:20px;
}

h2{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #1f2a44;
padding:8px;
text-align:center;
}

.player{
text-align:left;
padding-left:10px;
}

select{
margin-bottom:10px;
padding:6px;
}

.buyer0{background:#3b82f6}
.buyer1{background:#22c55e}
.buyer2{background:#a855f7}
.buyer3{background:#fb923c}
.buyer4{background:#f43f5e}
.buyer5{background:#14b8a6}

</style>
</head>

<body>

<h2>T20 Auction Board</h2>

<select id="teamSelect"></select>

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>KD</th>
<th>PG</th>
<th>SD</th>
<th>DEV</th>
<th>NR</th>
<th>SPL</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>


<script>

/* TEAMS */

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

/* BUYERS */

const buyers=["KD","PG","SD","DEV","NR","SPL"]

/* PLAYERS */

const players={

Mumbai:[
"Rohit Sharma","Surya Kumar Yadav","Robin Minz","Sherfane Rutherford","Ryan Rickelton",
"Quinton DeKock","Danish Malewar","Tilak Verma","Hardik Pandya","Naman Dhir",
"Mitchell Santner","Raj Angad Bawa","Atharva Ankolekar","Mayank Rawat","Corbin Bosch",
"Will Jacks","Shardul Thakur","Trent Boult","Mayank Markande","Deepak Chahar",
"Ashwani Kumar","Raghu Sharma","Mohd Izhar","Allah Ghazankar","Jasprit Bumrah"
],

Punjab:[
"Shreyas Iyer","Nehal Wadhera","Vishnu Vinod","Harnoor Pannu","Pyla Avinash",
"Prabhsimran Singh","Shashank Singh","Marcus Stoinis","Harpreet Brar","Marco Jensen",
"Azmatullah Omerzai","Priyansh Arya","Musheer Khan","Suryansh Shedge","Mitch Owen",
"Cooper Connolly","Ben Dwarshuis","Arsheep Singh","Yuzvendra Chahal","Vyshak Vijakumar",
"Yash Thakur","Xavier Bartlett","Pravin Dubey","Vishal Nishad","Lockie Ferguson"
]

}

/* DATA */

let data={}
teams.forEach(t=>data[t]=Array(25).fill(null))

let currentTeam="Mumbai"

/* TEAM SELECT */

const select=document.getElementById("teamSelect")

teams.forEach(t=>{
let o=document.createElement("option")
o.text=t
select.add(o)
})

select.onchange=()=>{
currentTeam=select.value
render()
}

/* RENDER */

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

players[currentTeam].forEach((p,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td><td class="player">${p}</td>`

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[currentTeam][i]==bi){
td.className="buyer"+bi
td.innerHTML=b
}

td.onclick=()=>{
data[currentTeam][i]=data[currentTeam][i]==bi?null:bi
render()
}

tr.appendChild(td)

})

body.appendChild(tr)

})

}

render()

</script>

</body>
</html>
