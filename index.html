<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board Live</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "PASTE_API_KEY",
authDomain: "PASTE_DOMAIN",
databaseURL: "PASTE_DATABASE_URL",
projectId: "PASTE_PROJECT_ID",
storageBucket: "PASTE_BUCKET",
messagingSenderId: "PASTE_ID",
appId: "PASTE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* BUYERS */

const buyers=["KD","PG","SD","DEV","NR","SPL"]

/* PLAYERS */

const players=[
"Rohit Sharma","Surya Kumar Yadav","Robin Minz","Sherfane Rutherford","Ryan Rickelton",
"Quinton DeKock","Danish Malewar","Tilak Verma","Hardik Pandya","Naman Dhir",
"Mitchell Santner","Raj Angad Bawa","Atharva Ankolekar","Mayank Rawat","Corbin Bosch",
"Will Jacks","Shardul Thakur","Trent Boult","Mayank Markande","Deepak Chahar",
"Ashwani Kumar","Raghu Sharma","Mohd Izhar","Allah Ghazankar","Jasprit Bumrah"
]

/* DATA */

let data=Array(25).fill(null)

/* SAVE */

function save(){
set(ref(db,"auction"),data)
}

/* LIVE SYNC */

onValue(ref(db,"auction"),snap=>{
let v=snap.val()
if(v) data=v
render()
})

/* RENDER */

window.render=function(){

const body=document.getElementById("rows")
body.innerHTML=""

players.forEach((p,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td><td>${p}</td>`

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[i]==bi){
td.className="buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{
data[i]=data[i]==bi?null:bi
save()
}

tr.appendChild(td)

})

body.appendChild(tr)

})

}

</script>

<style>

body{
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #1f2a44;
padding:8px;
text-align:center;
}

.buyer0{background:#3b82f6}
.buyer1{background:#22c55e}
.buyer2{background:#a855f7}
.buyer3{background:#fb923c}
.buyer4{background:#f43f5e}
.buyer5{background:#14b8a6}

</style>

</head>

<body onload="render()">

<h2>T20 Auction Board Live</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>KD</th>
<th>PG</th>
<th>SD</th>
<th>DEV</th>
<th>NR</th>
<th>SPL</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</body>
</html>
