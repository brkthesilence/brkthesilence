<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

header{
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

.tabs{
display:flex;
overflow-x:auto;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

.main{
display:flex;
height:calc(100vh - 90px);
}

.left{
flex:1;
overflow:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
position:sticky;
top:0;
background:#121a2b;
}

th,td{
border:1px solid #1f2a44;
padding:8px;
text-align:center;
}

.pointsInput{
width:60px;
background:#0f172a;
border:none;
color:white;
text-align:center;
}

.buyer0{background:#3b82f6;color:white}
.buyer1{background:#22c55e;color:black}
.buyer2{background:#a855f7;color:white}
.buyer3{background:#fb923c;color:black}
.buyer4{background:#f43f5e;color:white}
.buyer5{background:#14b8a6;color:white}

.side{
width:260px;
padding:20px;
border-left:1px solid #1f2a44;
background:#060a12;
}

.summary{
background:#10192c;
padding:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
border-radius:6px;
}

.rank{
display:flex;
justify-content:space-between;
padding:8px;
margin-bottom:6px;
border-radius:6px;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:6px 10px;
margin-top:6px;
cursor:pointer;
}

.matchPanel{
background:#10192c;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.toggle{
cursor:pointer;
font-weight:bold;
}

select{
background:#0f172a;
color:white;
border:none;
padding:6px;
margin-right:5px;
}

</style>
</head>

<body>

<header>
<h2>T20 Auction Board</h2>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">

<div class="left">

<div class="matchPanel">

<div class="toggle" onclick="toggleMatch()">▼ Match Points</div>

<div id="matchContent">

<br>

<select id="teamA"></select>
<select id="teamB"></select>

<button onclick="loadMatch()">Load Match</button>

<table id="matchTable" style="margin-top:10px"></table>

</div>

</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Status</th>
<th>KD</th>
<th>PG</th>
<th>SD</th>
<th>DEV</th>
<th>NR</th>
<th>SPL</th>
<th>Points</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Players Bought</h3>

<div class="summary">KD <span id="c0">0</span></div>
<div class="summary">PG <span id="c1">0</span></div>
<div class="summary">SD <span id="c2">0</span></div>
<div class="summary">DEV <span id="c3">0</span></div>
<div class="summary">NR <span id="c4">0</span></div>
<div class="summary">SPL <span id="c5">0</span></div>

<h3>Export</h3>
<button onclick="exportExcel()">Export Excel</button>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

</div>

</div>

<script>

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=["KD","PG","SD","DEV","NR","SPL"]

/* REAL PLAYER LISTS */

const players={

Mumbai:["Rohit Sharma","Surya Kumar Yadav","Robin Minz","Sherfane Rutherford","Ryan Rickelton","Quinton DeKock","Danish Malewar","Tilak Verma","Hardik Pandya","Naman Dhir","Mitchell Santner","Raj Angad Bawa","Atharva Ankolekar","Mayank Rawat","Corbin Bosch","Will Jacks","Shardul Thakur","Trent Boult","Mayank Markande","Deepak Chahar","Ashwani Kumar","Raghu Sharma","Mohd Izhar","Allah Ghazankar","Jasprit Bumrah"],

Punjab:["Shreyas Iyer","Nehal Wadhera","Vishnu Vinod","Harnoor Pannu","Pyla Avinash","Prabhsimran Singh","Shashank Singh","Marcus Stoinis","Harpreet Brar","Marco Jensen","Azmatullah Omerzai","Priyansh Arya","Musheer Khan","Suryansh Shedge","Mitch Owen","Cooper Connolly","Ben Dwarshuis","Arsheep Singh","Yuzvendra Chahal","Vyshak Vijakumar","Yash Thakur","Xavier Bartlett","Pravin Dubey","Vishal Nishad","Lockie Ferguson"],

Rajasthan:["Riyan Parag","Shubham Dubey","Vaibhav Suryavanshi","Donovan Ferreria","Lhuan Dre Pretorious","Ravi Singh","Aman Rao Perala","Shimron Hetmyer","Yashasvi Jaiswal","Dhruv Jurel","Yudhvir Singh Charak","Ravindra Jadeja","Sam Curran","Jofra Archer","Tushar Deshpende","Kuwena Maphaka","Ravi Bishnoi","Sushant Mishra","Yash Raj Kunja","Vignesh Puthoor","Brijesh Sharma","Adam Milne","Kuldeep Sen","Sandeep Sharma","Nandre Burger"],

Bangalore:["Rajat Patidar","Devdutt Padikkal","Virat Kohli","Phil Salt","Jitesh Sharma","Jordan Cox","Krunal Pandya","Swapnil Singh","Tim David","Romario Shepherd","Jacob Bethell","Venkatesh Iyer","Satvik Deswal","Mangesh Yadav","Vicky Ostwal","Vihaan Malhotra","Kanishk Chouhan","Josh Hazlewood","Rasikh Dar","Suyash Sharma","Bhuvneshwar Sharma","Nuwan Thusawa","Abhinandan Singh","Jacob Duffy","Yash Dayal"],

Hyderabad:["Ishan Kishan","Aniket Verma","Smaran Ravichandran","Salil Arora","Heinrich Klaasen","Travis Head","Harshal Patel","Kamindu Mendis","Harsh Dubey","Brydon Carse","Shivang Kumar","Krains Fuletra","Liam Livingstone","Jack Edwards","Abhishek Sharma","Nitish Kumar Reddy","Pat Cummins","Zeeshan Ansari","Jaydev Unadkat","Eshan Malinga","Sakib Hussain","Onkar Tarmale","Amit Kumar","Praful Hinge","Shivam Mavi"],

Chennai:["Ruturaj Gaikwad","MS Dhoni","Sanju Samson","Dewald Brevis","Ayush Mhatre","Kartik Sharma","Sarfaraz Khan","Urvil Patel","Anshul Kamboj","Jamie Overton","Ramakrishna Ghosh","Prashant Veer","Matthew Short","Aman Khan","Zak Foulkes","Shivam Dubey","Khaleel Ahmed","Noor Ahmed","Mukesh Choudhary","Nathan Ellis","Shreyas Gopal","Gurjapneet Singh","Akeal Hosein","Matt Henry","Rahul Chahar"],

Delhi:["KL Rahul","Karun Nair","David Miller","Ben Duckett","Pathum Nisaanka","Sahil Parakh","Prithvi Shaw","Abhishek Porel","Tristan Stubbs","Axar Patel","Sameer Rizvi","Ashutosh Sharma","Vipraj Nigam","Ajay Mandal","Tripurana Vijay","Madhav Tiwari","Auqib Dar","Nitish Rana","Mitchell Starc","T Natarajan","Mukesh Kumar","Dushamantha Chameera","Lungi Ngidi","Kyle Jamieson","Kuldeep Yadav"],

Gujarat:["Shubhman Gill","Jos Buttler","Kumar Kushagra","Anuj Rawat","Tom Banton","Glenn Philips","Nishant Sindhu","Washington Sundar","Mohd Arshad Khan","Sai Kishore","Jayant Yadav","Jason Holder","Sai Sudarshan","Shahrukh Khan","Kagiso Rabada","Mohd Siraj","Prasidh Krishna","Manav Suthar","Gurnoor Singh Brar","Ishant Sharma","Ashok Sharma","Prithvi Raj Yarra","Luke Wood","Rahul Tewatia","Rashid Khan"],

Kolkata:["Ajinkya Rahane","Rinku Singh","A Raghuvanshi","Manish Pandey","Cameron Green","Finn Allen","Tejasvi Singh","Rahul Tripathi","Tim Seifert","Rovman Powell","Anukul Roy","Sarthak Ranjan","Daksh Kamra","Rachin Ravindra","Ramandeep Singh","Vaibhav Arora","Matheesha Pathirana","Kartik Tyagi","Prashant Solanki","Akash Deep","Harshit Rana","Umran Malik","Sunil Narine","Varun Chakravarthy","NA"],

Lucknow:["Rishabh Pant","Aiden Markram","Himmat Singh","Matthew Breetzke","Mukul Chaudhary","Akshat Radhuwanshi","Josh Inglis","Nicholas Pooran","Mitchell Marsh","Abdul Samad","Shahbaz Ahmad","Arshin Kulkarni","Wanindu Hasaranga","Ayush Badoni","Mohd Shami","Avesh Khan","M Siddharth","Digvesh Rathi","Akash Singh","Prince Yadav","Arjun Tendulkar","Anrich Nortje","Naman Tiwari","Mayank Yadav","Mohsin Khan"]

}

let saved=JSON.parse(localStorage.getItem("auctionData"))
let data=saved?.data||{}
let points=saved?.points||{}

teams.forEach(t=>{
if(!data[t]) data[t]=Array(25).fill(null)
if(!points[t]) points[t]=Array(25).fill(0)
})

function save(){
localStorage.setItem("auctionData",JSON.stringify({data,points}))
}

let currentTeam=0

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
let el=document.createElement("div")
el.className="tab"
el.innerText=team

el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}

tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

players[teams[currentTeam]].forEach((player,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td><td>${player}</td>`

let status=document.createElement("td")
status.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(status)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[teams[currentTeam]][i]==bi){
td.className="buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{
data[teams[currentTeam]][i]=data[teams[currentTeam]][i]==bi?null:bi
save()
updateCounts()
updateLeaderboard()
render()
}

tr.appendChild(td)

})

let td=document.createElement("td")

let inp=document.createElement("input")
inp.className="pointsInput"
inp.value=points[teams[currentTeam]][i]

inp.oninput=()=>{
points[teams[currentTeam]][i]=parseInt(inp.value)||0
save()
updateLeaderboard()
}

td.appendChild(inp)
tr.appendChild(td)

body.appendChild(tr)

})

}

function updateCounts(){

let counts=[0,0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

function updateLeaderboard(){

let totals=[0,0,0,0,0,0]

teams.forEach(team=>{
for(let i=0;i<25;i++){
let buyer=data[team][i]
if(buyer!=null){
totals[buyer]+=points[team][i]||0
}
}
})

let arr=buyers.map((b,i)=>({name:b,pts:totals[i]}))
arr.sort((a,b)=>b.pts-a.pts)

let colors=[
"#d1fae5",
"#dcfce7",
"#fef9c3",
"#fde68a",
"#fecaca",
"#fbcfe8"
]

let html=""
let total=0

arr.forEach((t,i)=>{
total+=t.pts
html+=`<div class="rank" style="background:${colors[i]};color:#1f2937">
<span>${i+1}. ${t.name}</span>
<span>${t.pts}</span>
</div>`
})

html+=`<div class="summary">
<strong>Total</strong>
<strong>${total}</strong>
</div>`

leaderboard.innerHTML=html

}

function toggleMatch(){
let panel=document.getElementById("matchContent")
panel.style.display=panel.style.display==="none"?"block":"none"
}

function loadMatch(){

let a=teamA.value
let b=teamB.value

if(a===b) return

let html="<tr><th>Player</th><th>Team</th><th>Points</th></tr>"

;[a,b].forEach(team=>{

players[team].forEach((p,i)=>{

html+=`
<tr>
<td>${p}</td>
<td>${team}</td>
<td>
<input class="pointsInput"
value="${points[team][i]}"
oninput="
points['${team}'][${i}]=parseInt(this.value)||0;
save();
updateLeaderboard();
render();
">
</td>
</tr>
`

})

})

matchTable.innerHTML=html

}

teams.forEach(t=>{
let o1=document.createElement("option")
o1.value=t
o1.innerText=t
teamA.appendChild(o1)

let o2=document.createElement("option")
o2.value=t
o2.innerText=t
teamB.appendChild(o2)
})

function exportExcel(){

let rows=[]

teams.forEach(team=>{
players[team].forEach((p,i)=>{
let buyer=data[team][i]
rows.push({
Team:team,
Player:p,
Buyer:buyer==null?"Unsold":buyers[buyer],
Points:points[team][i]
})
})
})

let ws=XLSX.utils.json_to_sheet(rows)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Results")
XLSX.writeFile(wb,"AuctionFantasyResults.xlsx")

}

render()
updateCounts()
updateLeaderboard()

</script>

</body>
</html>
