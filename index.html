<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPL Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:#0b0f18;
color:white;
font-family:Segoe UI;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

.tabs{
display:flex;
overflow-x:auto;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

.container{
display:flex;
height:calc(100vh - 90px);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #1f2a44;
padding:10px;
text-align:center;
}

th{
background:#121a2b;
}

td input{
background:none;
border:none;
color:white;
width:100%;
outline:none;
}

.buyer{
cursor:pointer;
font-size:18px;
}

.activeBuyer{
background:#2ecc71;
color:black;
font-weight:bold;
}

.side{
width:280px;
background:#060a12;
padding:20px;
border-left:1px solid #1f2a44;
}

.summaryBox{
background:#10192c;
padding:15px;
margin-bottom:12px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:8px 14px;
margin-left:8px;
cursor:pointer;
border-radius:4px;
}

.export{
margin-top:20px;
}

.export button{
display:block;
width:100%;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h2>IPL Auction Board</h2>

<div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<button id="timer">15s</button>
</div>

</header>

<div class="tabs" id="tabs"></div>

<div class="container">

<div style="flex:1; overflow:auto">

<table id="auctionTable">

<thead>
<tr>
<th>Player Name</th>
<th>Status</th>
<th>SD + GR</th>
<th>KD + SK</th>
<th>PP + LG</th>
<th>NR + PK</th>
<th>DEVASHISH</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Live Summary</h3>

<div class="summaryBox">SD + GR <span id="c0">0</span></div>
<div class="summaryBox">KD + SK <span id="c1">0</span></div>
<div class="summaryBox">PP + LG <span id="c2">0</span></div>
<div class="summaryBox">NR + PK <span id="c3">0</span></div>
<div class="summaryBox">Devashish <span id="c4">0</span></div>

<div class="export">
<h4>Export Results</h4>

<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

</div>

</div>

<script>

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=[
"SD + GR","KD + SK","PP + LG","NR + PK","DEVASHISH"
]

let currentTeam=0
let data={}
let playerNames={}

teams.forEach(t=>{
data[t]=Array(25).fill(null)
playerNames[t]=Array(25).fill("")
})

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
const el=document.createElement("div")
el.className="tab"
el.innerText=team
el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}
tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

for(let i=0;i<25;i++){

let tr=document.createElement("tr")

let nameCell=document.createElement("td")

let input=document.createElement("input")
input.value=playerNames[teams[currentTeam]][i]

input.oninput=(e)=>{
playerNames[teams[currentTeam]][i]=e.target.value
}

nameCell.appendChild(input)
tr.appendChild(nameCell)

let status=document.createElement("td")
status.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(status)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")
td.className="buyer"

if(data[teams[currentTeam]][i]==bi){
td.classList.add("activeBuyer")
td.innerHTML="✓"
}

td.onclick=()=>{

if(data[teams[currentTeam]][i]==bi){
data[teams[currentTeam]][i]=null
}else{
data[teams[currentTeam]][i]=bi
}

updateCounts()
render()

}

tr.appendChild(td)

})

body.appendChild(tr)

}

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

render()

let timer=15
let interval

function startTimer(){
clearInterval(interval)

interval=setInterval(()=>{
timer--
document.getElementById("timer").innerText=timer+"s"

if(timer<=0){
clearInterval(interval)
}
},1000)
}

function resetTimer(){
timer=15
document.getElementById("timer").innerText="15s"
clearInterval(interval)
}

function exportExcel(){

let exportData=[]

teams.forEach(team=>{

for(let i=0;i<25;i++){

let buyerIndex=data[team][i]

exportData.push({

Team:team,
Player:playerNames[team][i],
Status:buyerIndex==null?"Unsold":"Sold",
Buyer:buyerIndex==null?"":buyers[buyerIndex]

})

}

})

let ws=XLSX.utils.json_to_sheet(exportData)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Auction")

XLSX.writeFile(wb,"AuctionResults.xlsx")

}

function exportPDF(){

const {jsPDF}=window.jspdf
const doc=new jsPDF()

doc.text("Auction Results",20,20)

let y=30

teams.forEach(team=>{

doc.text(team,20,y)
y+=8

for(let i=0;i<25;i++){

let buyerIndex=data[team][i]

let line=
playerNames[team][i]+" - "+
(buyerIndex==null?"Unsold":buyers[buyerIndex])

doc.text(line,25,y)

y+=7

}

y+=5

})

doc.save("AuctionResults.pdf")

}

</script>

</body>
</html>
