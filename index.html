<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

.tabs{
display:flex;
overflow-x:auto;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

.main{
display:flex;
height:calc(100vh - 100px);
}

.tableArea{
flex:1;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
position:sticky;
top:0;
background:#121a2b;
z-index:5;
}

th,td{
border:1px solid #1f2a44;
padding:10px;
text-align:center;
}

.buyer{
cursor:pointer;
font-weight:bold;
}

.buyer0{background:#3b82f6;color:white;}
.buyer1{background:#22c55e;color:black;}
.buyer2{background:#a855f7;color:white;}
.buyer3{background:#fb923c;color:black;}
.buyer4{background:#ef4444;color:white;}

.side{
width:260px;
padding:20px;
border-left:1px solid #1f2a44;
background:#060a12;
overflow-y:auto;
}

.summary{
background:#10192c;
padding:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
border-radius:6px;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:8px 12px;
margin:4px;
cursor:pointer;
}

.statInput{
width:40px;
background:#0f172a;
border:none;
color:white;
text-align:center;
}

.points{
font-weight:bold;
color:#22c55e;
}

.rank{
padding:8px;
margin-bottom:6px;
display:flex;
justify-content:space-between;
border-radius:6px;
}

.r1{background:#4ade80;color:black;}
.r2{background:#d9f99d;color:black;}
.r3{background:#fde68a;color:black;}
.r4{background:#fca5a5;color:black;}
.r5{background:#ef4444;color:white;}

</style>
</head>

<body>

<header>
<h2>T20 Auction Board</h2>

<div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<span id="timer">15s</span>
</div>

</header>

<div class="tabs" id="tabs"></div>

<div class="main">

<div class="tableArea">

<table>

<thead>
<tr>
<th>#</th>
<th>Player Name</th>
<th>Status</th>
<th>SD + GR</th>
<th>KD + SK</th>
<th>PP + LG</th>
<th>NR + PK</th>
<th>DEVASHISH</th>
<th>Runs</th>
<th>4s</th>
<th>6s</th>
<th>Wkts</th>
<th>Catches</th>
<th>Points</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Live Summary</h3>

<div class="summary">SD + GR <span id="c0">0</span></div>
<div class="summary">KD + SK <span id="c1">0</span></div>
<div class="summary">PP + LG <span id="c2">0</span></div>
<div class="summary">NR + PK <span id="c3">0</span></div>
<div class="summary">Devashish <span id="c4">0</span></div>

<h4>Export</h4>

<button onclick="exportExcel()">Excel</button>
<button onclick="exportPDF()">PDF</button>

<h3>Fantasy Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</div>

<script>

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=["SD + GR","KD + SK","PP + LG","NR + PK","DEVASHISH"]

let currentTeam=0

let saved=JSON.parse(localStorage.getItem("auction"))

let data=saved?.data||{}
let stats=saved?.stats||{}

teams.forEach(t=>{
if(!data[t]) data[t]=Array(25).fill(null)
if(!stats[t]) stats[t]=Array(25).fill(null)
})

function save(){
localStorage.setItem("auction",JSON.stringify({data,stats}))
}

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
let el=document.createElement("div")
el.className="tab"
el.innerText=team

el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}

tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function calcPoints(s){

return (
(s.runs||0) +
(s.f4||0)*1 +
(s.f6||0)*2 +
(s.w||0)*25 +
(s.c||0)*8
)

}

function updateLeaderboard(){

let totals=[0,0,0,0,0]

teams.forEach(team=>{

for(let i=0;i<25;i++){

let buyer=data[team][i]

if(buyer!=null){

let s=stats[team][i]||{}

totals[buyer]+=calcPoints(s)

}

}

})

let arr=buyers.map((b,i)=>({
name:b,
points:totals[i]
}))

arr.sort((a,b)=>b.points-a.points)

let html=""

let grand=0

arr.forEach((t,i)=>{

grand+=t.points

html+=`<div class="rank r${i+1}">
<span>${t.name}</span>
<span>${t.points.toLocaleString()}</span>
</div>`

})

html+=`<div class="summary">
<strong>Total</strong>
<strong>${grand.toLocaleString()}</strong>
</div>`

document.getElementById("leaderboard").innerHTML=html

}

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

for(let i=0;i<25;i++){

let tr=document.createElement("tr")

let td1=document.createElement("td")
td1.innerText=i+1
tr.appendChild(td1)

let td2=document.createElement("td")
td2.innerText="Player "+(i+1)
tr.appendChild(td2)

let td3=document.createElement("td")
td3.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(td3)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[teams[currentTeam]][i]==bi){
td.className="buyer buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{

if(data[teams[currentTeam]][i]==bi){
data[teams[currentTeam]][i]=null
}else{
data[teams[currentTeam]][i]=bi
}

save()
updateCounts()
render()

}

tr.appendChild(td)

})

if(!stats[teams[currentTeam]][i])
stats[teams[currentTeam]][i]={runs:0,f4:0,f6:0,w:0,c:0}

let s=stats[teams[currentTeam]][i]

function input(val,key){

let td=document.createElement("td")
let inp=document.createElement("input")

inp.className="statInput"
inp.value=val

inp.oninput=()=>{
s[key]=parseInt(inp.value)||0
save()
render()
}

td.appendChild(inp)
return td

}

tr.appendChild(input(s.runs,"runs"))
tr.appendChild(input(s.f4,"f4"))
tr.appendChild(input(s.f6,"f6"))
tr.appendChild(input(s.w,"w"))
tr.appendChild(input(s.c,"c"))

let p=document.createElement("td")
p.className="points"
p.innerText=calcPoints(s)

tr.appendChild(p)

body.appendChild(tr)

}

updateLeaderboard()

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

render()
updateCounts()

let timer=15
let interval

function startTimer(){
clearInterval(interval)

interval=setInterval(()=>{
timer--
document.getElementById("timer").innerText=timer+"s"

if(timer<=0) clearInterval(interval)

},1000)
}

function resetTimer(){
timer=15
document.getElementById("timer").innerText="15s"
clearInterval(interval)
}

function exportExcel(){}

function exportPDF(){}

</script>

</body>
</html>
