<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:#0b0f18;
color:white;
font-family:Segoe UI;
margin:0;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

/* TEAM TABS */

.tabs{
display:flex;
overflow-x:auto;
background:#0b0f18;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

/* MAIN LAYOUT */

.container{
display:flex;
height:calc(100vh - 100px);
}

/* TABLE AREA */

.table-area{
flex:1;
overflow-y:auto;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

thead th{
position:sticky;
top:0;
background:#121a2b;
z-index:2;
}

th,td{
border:1px solid #1f2a44;
padding:10px;
text-align:center;
}

.serial{
width:60px;
}

.buyer{
cursor:pointer;
font-size:18px;
}

/* BUYER COLORS */

.buyer0{background:#3b82f6;color:white;font-weight:bold;}
.buyer1{background:#22c55e;color:black;font-weight:bold;}
.buyer2{background:#a855f7;color:white;font-weight:bold;}
.buyer3{background:#fb923c;color:black;font-weight:bold;}
.buyer4{background:#ef4444;color:white;font-weight:bold;}

/* SIDE PANEL */

.side{
width:260px;
background:#060a12;
padding:20px;
border-left:1px solid #1f2a44;
}

.summaryBox{
background:#10192c;
padding:12px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:8px 14px;
margin:5px;
cursor:pointer;
border-radius:4px;
}

</style>
</head>

<body>

<header>
<h2>T20 Auction Board</h2>

<div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<button id="timer">15s</button>
</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="container">

<div class="table-area">

<table>

<thead>
<tr>
<th>#</th>
<th>Player Name</th>
<th>Status</th>
<th>SD + GR</th>
<th>KD + SK</th>
<th>PP + LG</th>
<th>NR + PK</th>
<th>DEVASHISH</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Live Summary</h3>

<div class="summaryBox">SD + GR <span id="c0">0</span></div>
<div class="summaryBox">KD + SK <span id="c1">0</span></div>
<div class="summaryBox">PP + LG <span id="c2">0</span></div>
<div class="summaryBox">NR + PK <span id="c3">0</span></div>
<div class="summaryBox">Devashish <span id="c4">0</span></div>

<h4>Export</h4>

<button onclick="exportExcel()">Excel</button>
<button onclick="exportPDF()">PDF</button>

</div>

</div>

<script>

const teams=["Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad","Chennai","Delhi","Gujarat","Kolkata","Lucknow"]

const buyers=["SD + GR","KD + SK","PP + LG","NR + PK","DEVASHISH"]

const playerNames={
"Mumbai":["Rohit Sharma","Surya Kumar Yadav","Robin Minz","Sherfane Rutherford","Ryan Rickelton","Quinton DeKock","Danish Malewar","Tilak Verma","Hardik Pandya","Naman Dhir","Mitchell Santner","Raj Angad Bawa","Atharva Ankolekar","Mayank Rawat","Corbin Bosch","Will Jacks","Shardul Thakur","Trent Boult","Mayank Markande","Deepak Chahar","Ashwani Kumar","Raghu Sharma","Mohd Izhar","Allah Ghazankar","Jasprit Bumrah"],

"Punjab":["Shreyas Iyer","Nehal Wadhera","Vishnu Vinod","Harnoor Pannu","Pyla Avinash","Prabhsimran Singh","Shashank Singh","Marcus Stoinis","Harpreet Brar","Marco Jensen","Azmatullah Omerzai","Priyansh Arya","Musheer Khan","Suryansh Shedge","Mitch Owen","Cooper Connolly","Ben Dwarshuis","Arsheep Singh","Yuzvendra Chahal","Vyshak Vijakumar","Yash Thakur","Xavier Bartlett","Pravin Dubey","Vishal Nishad","Lockie Ferguson"]
}

let currentTeam=0

let saved=JSON.parse(localStorage.getItem("auctionData"))
let data=saved?.data||{}

teams.forEach(t=>{
if(!data[t]) data[t]=Array(25).fill(null)
})

function saveData(){
localStorage.setItem("auctionData",JSON.stringify({data}))
}

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
let el=document.createElement("div")
el.className="tab"
el.innerText=team

el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}

tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

for(let i=0;i<25;i++){

let tr=document.createElement("tr")

let serial=document.createElement("td")
serial.innerText=i+1
tr.appendChild(serial)

let name=document.createElement("td")
name.innerText=playerNames[teams[currentTeam]][i]
tr.appendChild(name)

let status=document.createElement("td")
status.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(status)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")
td.className="buyer"

if(data[teams[currentTeam]][i]==bi){
td.classList.add("buyer"+bi)
td.innerHTML="✓"
}

td.onclick=()=>{

if(data[teams[currentTeam]][i]==bi){
data[teams[currentTeam]][i]=null
}else{
data[teams[currentTeam]][i]=bi
}

saveData()
updateCounts()
render()

}

tr.appendChild(td)

})

body.appendChild(tr)

}

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

render()
updateCounts()

let timer=15
let interval

function startTimer(){
clearInterval(interval)
interval=setInterval(()=>{
timer--
document.getElementById("timer").innerText=timer+"s"
if(timer<=0) clearInterval(interval)
},1000)
}

function resetTimer(){
timer=15
document.getElementById("timer").innerText="15s"
clearInterval(interval)
}

function exportExcel(){

let rows=[]

teams.forEach(team=>{
for(let i=0;i<25;i++){

let buyer=data[team][i]

rows.push({
Team:team,
Serial:i+1,
Player:playerNames[team][i],
Status:buyer==null?"Unsold":"Sold",
Buyer:buyer==null?"":buyers[buyer]
})

}
})

let ws=XLSX.utils.json_to_sheet(rows)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Auction")

XLSX.writeFile(wb,"AuctionResults.xlsx")

}

function exportPDF(){

const {jsPDF}=window.jspdf
const doc=new jsPDF()

doc.text("Auction Results",20,20)

let y=30

teams.forEach(team=>{

doc.text(team,20,y)
y+=8

for(let i=0;i<25;i++){

let buyer=data[team][i]

doc.text((i+1)+". "+playerNames[team][i]+" - "+(buyer==null?"Unsold":buyers[buyer]),25,y)

y+=7

}

y+=5

})

doc.save("AuctionResults.pdf")

}

</script>

</body>
</html>
