<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRK THE SILENCE — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #111111;
  --text: #f2f2f2;
  --divider: #2a2a2a;
  --button-border: #444444;
  --button-hover: #1a1a1a;
  --success: #888888;
}

body.light {
  --bg: #ffffff;
  --text: #1a1a1a;
  --divider: #e5e5e5;
  --button-border: #cccccc;
  --button-hover: #f5f5f5;
  --success: #555555;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.6;
  transition: 0.3s ease;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--divider);
}

.logo { font-weight: 500; letter-spacing: 1px; }
.toggle { cursor: pointer; font-size: 14px; opacity: 0.7; }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1000px;
  display: flex;
  justify-content: space-between;
  gap: 80px;
}

/* LEFT */
.left { max-width: 520px; }

.left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin-bottom: 20px;
}

.left p {
  font-size: 16px;
  margin-bottom: 30px;
}

.small {
  font-size: 13px;
  opacity: 0.6;
}

/* RIGHT */
.right {
  display: flex;
  flex-direction: column;
  gap: 20px;
  justify-content: center;
  min-width: 240px;
}

button {
  padding: 14px;
  background: transparent;
  border: 1px solid var(--button-border);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover { background: var(--button-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.counter { font-size: 12px; opacity: 0.5; }

.confirmation {
  font-size: 13px;
  color: var(--success);
  opacity: 0;
  transition: 0.3s ease;
}

.confirmation.show { opacity: 1; }

/* FOOTER */
footer {
  border-top: 1px solid var(--divider);
  padding: 15px 24px;
  font-size: 12px;
  opacity: 0.6;
  text-align: center;
}

.signature {
  font-family: "Vijaya", "Brush Script MT", cursive;
  font-size: 14px;
  margin-left: 6px;
  opacity: 0.8;
}

/* MOBILE */
@media (max-width: 900px) {

  .container {
    flex-direction: column;
    gap: 40px;
    justify-content: center;
  }

  .left h1 { font-size: 28px; }

}

</style>
</head>

<body>

<nav>
  <div class="logo">BRK THE SILENCE</div>
  <div class="toggle" onclick="toggleTheme()">Light / Dark</div>
</nav>

<div class="main">
  <div class="container">

    <div class="left">
      <h1>Silence is about to be examined.</h1>
      <p>
        A private publication exploring emotional performance,
        stress, and modern psychological realities.
      </p>
      <p class="small">Launching soon.</p>
    </div>

    <div class="right">
      <button id="interestBtn">I’m Interested</button>
      <div class="counter" id="interestCount">0 responses</div>

      <button id="curiousBtn">Just Curious</button>
      <div class="counter" id="curiousCount">0 responses</div>

      <div class="confirmation" id="confirmationMsg"></div>
    </div>

  </div>
</div>

<footer>
  © 2026 BRK THE SILENCE
  <span class="signature">by Siddhant Kuril</span>
</footer>

<script>

function initVoting() {

  let interest = parseInt(localStorage.getItem("interestCount") || "0");
  let curious = parseInt(localStorage.getItem("curiousCount") || "0");
  let hasVoted = localStorage.getItem("hasVoted") === "true";

  const interestBtn = document.getElementById("interestBtn");
  const curiousBtn = document.getElementById("curiousBtn");
  const interestDisplay = document.getElementById("interestCount");
  const curiousDisplay = document.getElementById("curiousCount");
  const confirmation = document.getElementById("confirmationMsg");

  interestDisplay.textContent = interest + " responses";
  curiousDisplay.textContent = curious + " responses";

  if (hasVoted) {
    interestBtn.disabled = true;
    curiousBtn.disabled = true;
    confirmation.textContent = "You have already voted.";
    confirmation.classList.add("show");
  }

  function vote(type) {

    if (localStorage.getItem("hasVoted") === "true") return;

    if (type === "interest") {
      interest++;
      localStorage.setItem("interestCount", interest);
      interestDisplay.textContent = interest + " responses";
    }

    if (type === "curious") {
      curious++;
      localStorage.setItem("curiousCount", curious);
      curiousDisplay.textContent = curious + " responses";
    }

    localStorage.setItem("hasVoted", "true");

    interestBtn.disabled = true;
    curiousBtn.disabled = true;

    confirmation.textContent = "Your response has been recorded.";
    confirmation.classList.add("show");
  }

  interestBtn.addEventListener("click", function(){ vote("interest"); });
  curiousBtn.addEventListener("click", function(){ vote("curious"); });
}

document.addEventListener("DOMContentLoaded", initVoting);

function toggleTheme() {
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
