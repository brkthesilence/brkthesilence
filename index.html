<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

.tabs{
display:flex;
overflow-x:auto;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

.main{
display:flex;
height:calc(100vh - 100px);
}

.tableArea{
flex:1;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
position:sticky;
top:0;
background:#121a2b;
z-index:5;
}

th,td{
border:1px solid #1f2a44;
padding:10px;
text-align:center;
}

.buyer{
cursor:pointer;
font-weight:bold;
}

.buyer0{background:#3b82f6;color:white;}
.buyer1{background:#22c55e;color:black;}
.buyer2{background:#a855f7;color:white;}
.buyer3{background:#fb923c;color:black;}
.buyer4{background:#ef4444;color:white;}

.side{
width:260px;
padding:20px;
border-left:1px solid #1f2a44;
background:#060a12;
}

.summary{
background:#10192c;
padding:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
border-radius:6px;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:8px 12px;
margin:4px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>T20 Auction Board</h2>

<div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<span id="timer">15s</span>
</div>

</header>

<div class="tabs" id="tabs"></div>

<div class="main">

<div class="tableArea">

<table>

<thead>
<tr>
<th>#</th>
<th>Player Name</th>
<th>Status</th>
<th>SD + GR</th>
<th>KD + SK</th>
<th>PP + LG</th>
<th>NR + PK</th>
<th>DEVASHISH</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Live Summary</h3>

<div class="summary">SD + GR <span id="c0">0</span></div>
<div class="summary">KD + SK <span id="c1">0</span></div>
<div class="summary">PP + LG <span id="c2">0</span></div>
<div class="summary">NR + PK <span id="c3">0</span></div>
<div class="summary">Devashish <span id="c4">0</span></div>

<h4>Export</h4>

<button onclick="exportExcel()">Excel</button>
<button onclick="exportPDF()">PDF</button>

</div>

</div>

<script>

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=["SD + GR","KD + SK","PP + LG","NR + PK","DEVASHISH"]

let currentTeam=0

let saved=JSON.parse(localStorage.getItem("auction"))
let data=saved?.data||{}

teams.forEach(t=>{
if(!data[t]) data[t]=Array(25).fill(null)
})

function save(){
localStorage.setItem("auction",JSON.stringify({data}))
}

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
let el=document.createElement("div")
el.className="tab"
el.innerText=team

el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}

tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

for(let i=0;i<25;i++){

let tr=document.createElement("tr")

let td1=document.createElement("td")
td1.innerText=i+1
tr.appendChild(td1)

let td2=document.createElement("td")
td2.innerText="Player "+(i+1)
tr.appendChild(td2)

let td3=document.createElement("td")
td3.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(td3)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[teams[currentTeam]][i]==bi){
td.className="buyer buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{

if(data[teams[currentTeam]][i]==bi){
data[teams[currentTeam]][i]=null
}else{
data[teams[currentTeam]][i]=bi
}

save()
updateCounts()
render()

}

tr.appendChild(td)

})

body.appendChild(tr)

}

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

render()
updateCounts()

let timer=15
let interval

function startTimer(){
clearInterval(interval)

interval=setInterval(()=>{
timer--
document.getElementById("timer").innerText=timer+"s"

if(timer<=0) clearInterval(interval)

},1000)
}

function resetTimer(){
timer=15
document.getElementById("timer").innerText="15s"
clearInterval(interval)
}

function exportExcel(){

let rows=[]

teams.forEach(team=>{

for(let i=0;i<25;i++){

let buyer=data[team][i]

rows.push({
Team:team,
Serial:i+1,
Player:"Player "+(i+1),
Status:buyer==null?"Unsold":"Sold",
Buyer:buyer==null?"":buyers[buyer]
})

}

})

let ws=XLSX.utils.json_to_sheet(rows)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Auction")

XLSX.writeFile(wb,"AuctionResults.xlsx")

}

function exportPDF(){

const {jsPDF}=window.jspdf
const doc=new jsPDF()

doc.text("Auction Results",20,20)

let y=30

teams.forEach(team=>{

doc.text(team,20,y)
y+=8

for(let i=0;i<25;i++){

let buyer=data[team][i]

doc.text((i+1)+". Player "+(i+1)+" - "+(buyer==null?"Unsold":buyers[buyer]),25,y)

y+=7

}

y+=5

})

doc.save("AuctionResults.pdf")

}

</script>

</body>
</html>
