<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T20 Auction Board</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#000;
color:#fff;
overflow:hidden;
}

.topbar{
position:sticky;
top:0;
background:#111;
display:flex;
align-items:center;
gap:10px;
padding:10px;
overflow-x:auto;
border-bottom:1px solid #333;
}

.tab{
padding:8px 14px;
border:1px solid #444;
background:#000;
cursor:pointer;
white-space:nowrap;
}

.tab.active{
background:#1f1f1f;
border-color:#888;
}

.timer{
margin-left:auto;
font-size:20px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 50px);
}

.table-wrap{
flex:1;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:10px;
text-align:center;
min-width:120px;
}

th{
background:#111;
}

.player{
text-align:left;
background:#000;
color:#fff;
border:none;
width:100%;
outline:none;
}

.buyer{
cursor:pointer;
height:40px;
}

.buyer.active{
background:#00c853;
color:#000;
font-weight:bold;
}

.sold{
background:#002b00;
}

.sidepanel{
width:220px;
border-left:1px solid #333;
padding:20px;
background:#0a0a0a;
}

.count{
margin-bottom:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="topbar" id="tabs"></div>

<div class="container">

<div class="table-wrap">
<table id="auctionTable">

<thead>
<tr>
<th>Player Name</th>
<th>SD + GR</th>
<th>KD + SK</th>
<th>PP + LG</th>
<th>NR + PK</th>
<th>DEVASHISH</th>
</tr>
</thead>

<tbody id="players"></tbody>

</table>
</div>

<div class="sidepanel">

<div class="timer" id="timer">15</div>

<div class="count">SD + GR: <span id="c0">0</span></div>
<div class="count">KD + SK: <span id="c1">0</span></div>
<div class="count">PP + LG: <span id="c2">0</span></div>
<div class="count">NR + PK: <span id="c3">0</span></div>
<div class="count">Devashish: <span id="c4">0</span></div>

</div>

</div>

<script>

const buyers=[
"SD + GR",
"KD + SK",
"PP + LG",
"NR + PK",
"DEVASHISH"
]

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow",
"Mumbai 2","Punjab 2","Rajasthan 2","Bangalore 2","Hyderabad 2",
"Chennai 2","Delhi 2","Gujarat 2","Kolkata 2","Lucknow 2"
]

let currentTeam=0
let data={}

teams.forEach(t=>{
data[t]=Array(25).fill(null)
})

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
const el=document.createElement("div")
el.className="tab"
el.innerText=team
el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}
tabs.appendChild(el)
})

tabs.firstChild.classList.add("active")

function render(){

const body=document.getElementById("players")
body.innerHTML=""

for(let i=0;i<25;i++){

const tr=document.createElement("tr")

const td=document.createElement("td")
const input=document.createElement("input")
input.className="player"
input.placeholder="Paste player name"
td.appendChild(input)
tr.appendChild(td)

buyers.forEach((b,bi)=>{

const cell=document.createElement("td")
cell.className="buyer"

if(data[teams[currentTeam]][i]===bi){
cell.classList.add("active")
tr.classList.add("sold")
}

cell.onclick=()=>{

if(data[teams[currentTeam]][i]===bi){
data[teams[currentTeam]][i]=null
}else{
data[teams[currentTeam]][i]=bi
}

updateCounts()
render()

}

tr.appendChild(cell)

})

body.appendChild(tr)

}

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!==null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

render()

let time=15

setInterval(()=>{
time--
if(time<=0) time=15
document.getElementById("timer").innerText=time
},1000)

</script>

</body>
</html>
