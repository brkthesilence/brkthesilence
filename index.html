<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>T20 Auction Board</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f18;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0a0d14;
border-bottom:1px solid #1f2a44;
}

.tabs{
display:flex;
overflow-x:auto;
border-bottom:1px solid #1f2a44;
}

.tab{
padding:10px 20px;
cursor:pointer;
border-right:1px solid #1f2a44;
}

.tab.active{
background:#152238;
}

.main{
display:flex;
height:calc(100vh - 100px);
}

.tableArea{
flex:1;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
position:sticky;
top:0;
background:#121a2b;
z-index:5;
}

th,td{
border:1px solid #1f2a44;
padding:8px;
text-align:center;
}

.buyer{
cursor:pointer;
font-weight:bold;
}

.buyer0{background:#3b82f6;color:white;}
.buyer1{background:#22c55e;color:black;}
.buyer2{background:#a855f7;color:white;}
.buyer3{background:#fb923c;color:black;}
.buyer4{background:#ef4444;color:white;}

.side{
width:260px;
padding:20px;
border-left:1px solid #1f2a44;
background:#060a12;
}

.summary{
background:#10192c;
padding:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
border-radius:6px;
}

.pointsInput{
width:60px;
background:#0f172a;
border:none;
color:white;
text-align:center;
}

button{
background:#1b2a44;
color:white;
border:none;
padding:8px 12px;
margin:4px;
cursor:pointer;
}

.rank{
display:flex;
justify-content:space-between;
padding:8px;
margin-bottom:6px;
border-radius:6px;
}

.r1{background:#4ade80;color:black;}
.r2{background:#d9f99d;color:black;}
.r3{background:#fde68a;color:black;}
.r4{background:#fca5a5;color:black;}
.r5{background:#ef4444;color:white;}

</style>
</head>

<body>

<header>
<h2>T20 Auction Board</h2>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">

<div class="tableArea">

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Status</th>
<th>SD+GR</th>
<th>KD+SK</th>
<th>PP+LG</th>
<th>NR+PK</th>
<th>DEV</th>
<th>Points</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="side">

<h3>Players Bought</h3>

<div class="summary">SD+GR <span id="c0">0</span></div>
<div class="summary">KD+SK <span id="c1">0</span></div>
<div class="summary">PP+LG <span id="c2">0</span></div>
<div class="summary">NR+PK <span id="c3">0</span></div>
<div class="summary">DEV <span id="c4">0</span></div>

<h3>Export</h3>

<button onclick="exportExcel()">Export Excel</button>

<h3>Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</div>

<script>

const teams=[
"Mumbai","Punjab","Rajasthan","Bangalore","Hyderabad",
"Chennai","Delhi","Gujarat","Kolkata","Lucknow"
]

const buyers=["SD+GR","KD+SK","PP+LG","NR+PK","DEV"]

let currentTeam=0

let data={}
let points={}

teams.forEach(t=>{
data[t]=Array(25).fill(null)
points[t]=Array(25).fill(0)
})

const tabs=document.getElementById("tabs")

teams.forEach((team,i)=>{
let el=document.createElement("div")
el.className="tab"
el.innerText=team

el.onclick=()=>{
currentTeam=i
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
render()
}

tabs.appendChild(el)
})

tabs.children[0].classList.add("active")

function render(){

const body=document.getElementById("rows")
body.innerHTML=""

for(let i=0;i<25;i++){

let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td><td>Player ${i+1}</td>`

let status=document.createElement("td")
status.innerText=data[teams[currentTeam]][i]==null?"—":"SOLD"
tr.appendChild(status)

buyers.forEach((b,bi)=>{

let td=document.createElement("td")

if(data[teams[currentTeam]][i]==bi){
td.className="buyer buyer"+bi
td.innerHTML="✓"
}

td.onclick=()=>{

data[teams[currentTeam]][i]=data[teams[currentTeam]][i]==bi?null:bi

updateCounts()
updateLeaderboard()
render()

}

tr.appendChild(td)

})

let td=document.createElement("td")

let inp=document.createElement("input")
inp.className="pointsInput"
inp.value=points[teams[currentTeam]][i]

inp.oninput=()=>{

points[teams[currentTeam]][i]=parseInt(inp.value)||0
updateLeaderboard()

}

td.appendChild(inp)

tr.appendChild(td)

body.appendChild(tr)

}

}

function updateCounts(){

let counts=[0,0,0,0,0]

Object.values(data).forEach(team=>{
team.forEach(b=>{
if(b!=null) counts[b]++
})
})

counts.forEach((c,i)=>{
document.getElementById("c"+i).innerText=c
})

}

function updateLeaderboard(){

let totals=[0,0,0,0,0]

teams.forEach(team=>{

for(let i=0;i<25;i++){

let buyer=data[team][i]

if(buyer!=null){

totals[buyer]+=points[team][i]||0

}

}

})

let arr=buyers.map((b,i)=>({name:b,pts:totals[i]}))

arr.sort((a,b)=>b.pts-a.pts)

let html=""
let grand=0

arr.forEach((t,i)=>{

grand+=t.pts

html+=`<div class="rank r${i+1}">
<span>${t.name}</span>
<span>${t.pts}</span>
</div>`

})

html+=`<div class="summary">
<strong>Total</strong>
<strong>${grand}</strong>
</div>`

document.getElementById("leaderboard").innerHTML=html

}

function exportExcel(){

let rows=[]

teams.forEach(team=>{

for(let i=0;i<25;i++){

let buyer=data[team][i]

rows.push({
Team:team,
Player:"Player "+(i+1),
Buyer:buyer==null?"Unsold":buyers[buyer],
Points:points[team][i]||0
})

}

})

let ws=XLSX.utils.json_to_sheet(rows)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Results")

XLSX.writeFile(wb,"AuctionFantasyResults.xlsx")

}

render()
updateCounts()
updateLeaderboard()

</script>

</body>
</html>
